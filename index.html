   INIMIGOS / COMBATE
=================================================================== */

const ENEMIES = {
  esqueleto:{
    name:'Guarda Esqueleto', boss:false,
    stats:{FOR:1,AGL:2,PRE:0,DUR:3},
    weaponKey:'espada_enferrujada', armorKey:'armadura_enferrujada',
    trait:'Imune a veneno. Ao cair a 0 PV pela primeira vez, reergue-se com metade do PV.',
    loot:[{type:'weapon', key:'espada_enferrujada'},{type:'armor', key:'armadura_enferrujada'}]
  },
  kobold:{
    name:'Kobold', boss:false,
    stats:{FOR:2,AGL:3,PRE:1,DUR:0},
    weaponKey:'maca', armorKey:'escudo_madeira',
    trait:'1 em 6 de chance de aparar um ataque: anula o dano e contra-ataca na hora.',
    loot:[{type:'weapon', key:'maca'},{type:'armor', key:'escudo_madeira'}]
  },
  ciclope:{
    name:'Ciclope', boss:true,
    stats:{FOR:3,AGL:1,PRE:3,DUR:6},
    weaponKey:'martelo', armorKey:'capuz',
    trait:'1 em 6 de chance de um bramido: cancela seu próximo turno, a menos que resista com teste de PRE.',
    loot:[]
  }
};

function effEnemyAGL(e){
  const armor = ARMORS[e.armorKey];
  return e.stats.AGL + (armor ? (armor.aglMod||0) : 0);
}

function spawnEnemy(key){
  const base = ENEMIES[key];
  const pvR = roll();
  const caR = roll();
  const armorAglMod = (ARMORS[base.armorKey] && ARMORS[base.armorKey].aglMod) || 0;
  return {
    key, name:base.name, boss:base.boss, stats:{...base.stats},
    pv: base.stats.DUR + pvR, pvMax: base.stats.DUR + pvR,
    ca: base.stats.AGL + armorAglMod + caR,
    weaponKey: base.weaponKey, armorKey: base.armorKey,
    trait: base.trait, loot: base.loot,
    revived:false, fearApplied:false
  };
}

function tickPerkCooldowns(){
  if(state.perkCooldowns.mago>0) state.perkCooldowns.mago--;
  if(state.perkCooldowns.warlock>0) state.perkCooldowns.warlock--;
}

async function startCombat(enemyKey, isBoss){
  document.getElementById('actions').innerHTML = '';
  state.inCombat = true;
  renderRoomPVMarker();
  state.combatFirstAttackDone = false;
  state.cavaleiroGuardBonus = 0;
  state.combatEnemy = spawnEnemy(enemyKey);
  const e = state.combatEnemy;
  document.getElementById('combat').classList.add('active');
  renderCombat();
  logEntry(`<span class="txt">PV do ${e.name}: ${e.pv} — CA: ${e.ca}</span>`);
  await sleep(500);

  const init = roll();
  const playerFirst = init>3;
  logEntry(`<b>Iniciativa</b> ${dieSpan(init)} <span class="txt">${playerFirst? 'Você age primeiro.' : 'O inimigo age primeiro.'}</span>`);
  await sleep(600);

  if(playerFirst){
    renderCombatActions();
  } else {
    await enemyTurn();
  }
}

function renderCombat(){
  const e = state.combatEnemy;
  const c = document.getElementById('combat');
  const pvPctE = Math.max(0, Math.round(100*e.pv/e.pvMax));
  const pvPctPlayer = Math.max(0, Math.round(100*state.pv/state.pvMax));
  c.innerHTML = `
    <div class="combat-vs">
      <div class="enemy-box">
        <h3>${e.name}${e.boss? ' — CHEFE':''}${e.poisoned? ' <span style="color:var(--acid);font-size:11px;">☠ envenenado</span>':''}</h3>
        <div class="bar-wrap"><div class="bar-fill" style="width:${pvPctE}%; background:var(--blood)"></div><div class="bar-label">PV ${Math.max(0,e.pv)} / ${e.pvMax}</div></div>
        <div style="font-size:11.5px;color:var(--dim)">CA ${e.ca} · ${WEAPONS[e.weaponKey].name} · ${ARMORS[e.armorKey].name}</div>
        <div style="font-size:11px;color:var(--dim);margin-top:4px;">${e.trait}</div>
      </div>
      <div class="vs-mark">VS</div>
      <div class="enemy-box" style="text-align:right;">
        <h3 style="color:var(--acid)">Você</h3>
        <div class="bar-wrap"><div class="bar-fill" style="width:${pvPctPlayer}%"></div><div class="bar-label">PV ${Math.max(0,state.pv)} / ${state.pvMax}</div></div>
        <div style="font-size:11.5px;color:var(--dim)">CA ${currentCA()}</div>
      </div>
    </div>
  `;
}

function renderCombatActions(){
  const actions = document.getElementById('actions');
  actions.innerHTML = '';
  const w = WEAPONS[state.weaponKey];

  actions.appendChild(mkButton(`Atacar com ${w.name}`, playerAttack));

  if(state.cls==='cavaleiro'){
    actions.appendChild(mkButton('Guarda de Aço (rola d6, aumenta CA até o próximo turno)', async ()=>{
      document.getElementById('actions').innerHTML = '';
      const guardRoll = roll();
      state.cavaleiroGuardBonus = guardRoll;
      const critNote = guardRoll===6 ? ' Como caiu 6, isso também anula um crítico inimigo (d6=6) por completo.' : '';
      logEntry(`<b>Guarda de Aço</b> ${dieSpan(guardRoll)} <span class="txt">CA sobe em ${guardRoll} até seu próximo turno (agora <b>${currentCA()}</b>). Se o próximo ataque inimigo rolar o mesmo d6, você contra-ataca.${critNote}</span>`,'good');
      await sleep(500);
      renderSheet();
      await enemyTurn();
    },'secondary'));
  }
  if(state.cls==='mago'){
    if(state.perkCooldowns.mago<=0){
      actions.appendChild(mkButton('Rajada Elemental', async ()=>{
        document.getElementById('actions').innerHTML = '';
        state.perkCooldowns.mago = 3;
        logEntry(`<span class="txt"><b>Rajada Elemental</b>: dano mágico ignora armadura.</span>`);
        const r = rollForPlayer('Rajada Elemental');
        await sleep(500);
        if(r===1){
          logEntry(`<span class="txt dmg">A magia falha e explode em suas mãos! Você sofre <b>1</b> de dano.</span>`,'dmg');
          state.pv -= 1;
          renderSheet();
          renderCombat();
          await sleep(500);
          checkDeath();
          if(state.dead) return;
          await enemyTurn();
          return;
        }
        const dmg = r + effPRE();
        logEntry(`<span class="txt">d6 ${r} + PRE ${effPRE()} = <b>${dmg}</b> de dano</span>`);
        await sleep(450);
        await applyDamageToEnemy(dmg, true);
      },'secondary'));
    } else {
      const b = mkButton(`Rajada Elemental (recarrega em ${state.perkCooldowns.mago})`, ()=>{}, 'secondary');
      b.disabled = true;
      actions.appendChild(b);
    }
  }
  if(state.cls==='warlock'){
    if(state.perkCooldowns.warlock<=0 && !state._pactActive){
      actions.appendChild(mkButton('Pacto Sombrio (vantagem + anula crítico inimigo)', async ()=>{
        document.getElementById('actions').innerHTML = '';
        state.perkCooldowns.warlock = 3;
        state._pactActive = true;
        logEntry(`<span class="txt good"><b>Pacto Sombrio</b> ativado: seu próximo ataque terá vantagem, e um crítico inimigo (d6=6) nesse meio-tempo será anulado.</span>`,'good');
        await sleep(500);
        await enemyTurn();
      },'secondary'));
    } else if(state.perkCooldowns.warlock>0){
      const b = mkButton(`Pacto Sombrio (recarrega em ${state.perkCooldowns.warlock})`, ()=>{}, 'secondary');
      b.disabled = true;
      actions.appendChild(b);
    }
  }

  actions.appendChild(mkButton('Fugir para trás (teste de AGL vs CA do inimigo)', attemptFlee, 'secondary'));
}

async function playerAttack(){
  document.getElementById('actions').innerHTML = '';
  const w = WEAPONS[state.weaponKey];
  const e = state.combatEnemy;
  let advantage = false;
  let advantageReason = '';
  if(state.cls==='ladino' && !state.combatFirstAttackDone){ advantage = true; advantageReason = 'Golpe Furtivo'; }
  if(state._pactActive){ advantage = true; advantageReason = 'Pacto Sombrio'; }

  if(advantage){
    logEntry(`<span class="txt"><b>${advantageReason}</b>: rolagem de ataque com vantagem (2d6, usa o maior).</span>`);
    await sleep(350);
  }

  const atkRoll = rollForPlayer('Ataque', {advantage});
  if(state._pactActive) state._pactActive = false;
  state.combatFirstAttackDone = true;

  const isCrit = atkRoll===6;
  const total = atkRoll + effAGL();
  const mirCerteira = state.cls==='cacador' && state.weaponKey==='arco';
  const autoHit = isCrit || mirCerteira;
  const hit = autoHit || total>=e.ca;

  await sleep(450);
  logEntry(`<span class="txt">Acerto: d6 ${atkRoll} + AGL ${effAGL()} = <b>${total}</b> vs CA ${e.ca}</span>`);
  await sleep(400);

  if(isCrit){
    logEntry(`<span class="txt" style="color:var(--blue)"><b>CRÍTICO!</b> Ignora CA (acerto automático) e ignora armadura no dano.</span>`);
    await sleep(400);
  } else if(mirCerteira && total<e.ca){
    logEntry(`<span class="txt"><b>Mira Certeira</b>: acerto automático com Arco (ignora CA).</span>`);
    await sleep(400);
  }
  logEntry(`<span class="txt">${hit? '<b style="color:var(--acid)">Acerto!</b>' : '<b style="color:var(--blood)">Erro.</b>'}</span>`);
  await sleep(400);

  const isArco = state.weaponKey==='arco';

  if(!hit){
    if(isArco && state.weaponPoisoned){
      state.weaponPoisoned = false;
      renderSheet();
      logEntry(`<span class="txt">O veneno se perde junto com a flecha que errou o alvo.</span>`);
      await sleep(400);
    }
    await enemyTurn();
    return;
  }

  if(e.key==='kobold' && roll()===1){
    logEntry(`<span class="txt dmg">O kobold apara o golpe e contra-ataca!</span>`,'dmg');
    await sleep(500);
    await enemyTurn(true);
    return;
  }

  let dmgRoll;
  if(isCrit && w.critAdvantage){
    const d1 = roll(), d2 = roll();
    dmgRoll = Math.max(d1, d2);
    logEntry(`<span class="txt">Crítico com ${w.name}: 2 rolagens de dano ${dieSpan(d1)} ${dieSpan(d2)} — usa a maior (<b>${dmgRoll}</b>)</span>`);
    await sleep(400);
  } else {
    dmgRoll = roll();
  }
  let dmg = dmgRoll + w.n + state.stats.FOR;
  logEntry(`<span class="txt">Dano base: d6 ${dmgRoll} + arma (${w.name}) ${w.n} + FOR ${state.stats.FOR} = <b>${dmg}</b></span>`);
  await sleep(400);

  if(state.cls==='barbaro' && state.pv <= state.pvMax/2){
    dmg += 2;
    logEntry(`<span class="txt"><b>Fúria de Sangue</b>: PV ≤ metade do máximo, +2 de dano → <b>${dmg}</b></span>`);
    await sleep(380);
  }
  if(mirCerteira){
    dmg += 1;
    logEntry(`<span class="txt"><b>Mira Certeira</b>: +1 de dano fixo com Arco → <b>${dmg}</b></span>`);
    await sleep(380);
  }

  await sleep(300);
  const result = await dealDamageToEnemyCore(dmg, isCrit);

  if(state.weaponPoisoned){
    const penetrated = result.finalDamage > 0;
    const consumeNow = isArco || penetrated;
    if(consumeNow){
      state.weaponPoisoned = false;
      renderSheet();
      if(penetrated){
        if(e.key==='esqueleto'){
          logEntry(`<span class="txt">O veneno não tem efeito — ${e.name} é imune a veneno.</span>`);
        } else if(result.status!=='dead'){
          e.poisoned = true;
          logEntry(`<span class="txt good"><b>Veneno Raro</b>: o dano penetrou a armadura — ${e.name} foi envenenado, perderá 1 PV a cada turno.</span>`,'good');
        }
      } else {
        logEntry(`<span class="txt">A flecha envenenada não penetrou a armadura — o veneno se perde de qualquer forma.</span>`);
      }
      await sleep(400);
    } else {
      logEntry(`<span class="txt">O veneno na lâmina permanece — o golpe não penetrou a armadura.</span>`);
      await sleep(300);
    }
  }

  if(result.status==='dead'){ await winCombat(); return; }
  await enemyTurn();
}

async function dealDamageToEnemyCore(dmg, ignoreArmor){
  const e = state.combatEnemy;
  const armorVal = ARMORS[e.armorKey].reduce;
  const applied = ignoreArmor ? 0 : armorVal;

  if(ignoreArmor && armorVal>0){
    logEntry(`<span class="txt">Ignora a ${ARMORS[e.armorKey].name} do ${e.name} (-${armorVal} anulado).</span>`);
    await sleep(350);
  } else if(applied>0){
    logEntry(`<span class="txt">${ARMORS[e.armorKey].name} do ${e.name} reduz ${applied} de dano.</span>`);
    await sleep(350);
  }

  const final = Math.max(0, dmg - applied);
  e.pv -= final;
  logEntry(`<span class="txt dmg">${e.name} sofre <b>${final}</b> de dano${applied>0? ` (${dmg} bruto − ${applied} armadura)`:''}.</span>`,'dmg');
  renderCombat();
  await sleep(550);

  if(e.pv<=0){
    if(e.key==='esqueleto' && !e.revived){
      e.revived = true;
      e.pv = Math.ceil(e.pvMax/2);
      logEntry(`<span class="txt dmg">O Guarda Esqueleto desmorona... e se reergue com metade do PV.</span>`,'dmg');
      renderCombat();
      await sleep(650);
      return {status:'revived', finalDamage:final};
    }
    return {status:'dead', finalDamage:final};
  }
  return {status:'alive', finalDamage:final};
}

async function applyDamageToEnemy(dmg, ignoreArmor){
  const result = await dealDamageToEnemyCore(dmg, ignoreArmor);
  if(result.status==='dead'){ await winCombat(); return; }
  await enemyTurn();
}

async function enemyTurn(skipRoar){
  if(state.dead) return;
  document.getElementById('actions').innerHTML = '';
  const e = state.combatEnemy;

  if(e.key==='ciclope' && !skipRoar && roll()===1){
    await enemyTurn(true);
    await sleep(550);
    logEntry(`<span class="txt dmg">O Ciclope solta um bramido ensurdecedor!</span>`,'dmg');
    await sleep(550);
    const r = rollForPlayer('Resistir ao medo — PRE');
    const total = r + effPRE();
    await sleep(350);
    logEntry(`<span class="txt">Resistência: d6 ${r} + PRE ${effPRE()} = <b>${total}</b> vs 8</span>`);
    await sleep(450);
    if(total<8){
      logEntry(`<span class="txt dmg">Você congela de medo — turno perdido. O Ciclope aproveita e ataca de novo.</span>`,'dmg');
      await sleep(500);
      await enemyTurn(true);
      return;
    } else {
      logEntry(`<span class="txt good">Você resiste ao pavor.</span>`,'good');
      await sleep(400);
    }
  }

  const guardBonusForThisAttack = state.cls==='cavaleiro' ? state.cavaleiroGuardBonus : 0;

  const w = WEAPONS[e.weaponKey];
  const atkRoll = roll();
  let isCrit = atkRoll===6;
  let pactNullified = false;
  let guardCritNullified = false;
  if(isCrit && state._pactActive){
    isCrit = false;
    pactNullified = true;
  } else if(isCrit && guardBonusForThisAttack===6){
    isCrit = false;
    guardCritNullified = true;
  }
  const total = atkRoll + effEnemyAGL(e);
  const ca = currentCA();
  const hit = isCrit || total>=ca;
  logEntry(`<b>${e.name} ataca</b> ${dieSpan(atkRoll,{crit:atkRoll===6,bad:atkRoll===1})} <span class="txt">d6 ${atkRoll} + AGL ${effEnemyAGL(e)} = <b>${total}</b> vs sua CA ${ca}</span>`);
  await sleep(450);

  if(pactNullified){
    logEntry(`<span class="txt good"><b>Pacto Sombrio</b> anula o crítico do ${e.name} (d6=6) — tratado como acerto normal, sem ignorar CA ou armadura.</span>`,'good');
    await sleep(450);
  } else if(guardCritNullified){
    logEntry(`<span class="txt good"><b>Guarda de Aço</b> (d6=6) anula o crítico do ${e.name} — sem ignorar CA ou armadura, e você contra-ataca em seguida.</span>`,'good');
    await sleep(450);
  } else if(isCrit){
    logEntry(`<span class="txt" style="color:var(--blue)"><b>CRÍTICO!</b> Ignora sua CA (acerto automático) e sua armadura no dano.</span>`);
    await sleep(400);
  }
  logEntry(`<span class="txt">${hit? '<b style="color:var(--blood)">Acerto.</b>':'<b style="color:var(--acid)">Erro.</b>'}</span>`);
  await sleep(400);

  if(hit){
    let dmgRoll;
    if(isCrit && w.critAdvantage){
      const d1 = roll(), d2 = roll();
      dmgRoll = Math.max(d1, d2);
      logEntry(`<span class="txt">Crítico do ${e.name}: 2 rolagens de dano ${dieSpan(d1)} ${dieSpan(d2)} — usa a maior (<b>${dmgRoll}</b>)</span>`);
      await sleep(380);
    } else {
      dmgRoll = roll();
    }
    let dmg = dmgRoll + w.n + e.stats.FOR;
    logEntry(`<span class="txt">Dano do ${e.name}: d6 ${dmgRoll} + arma (${w.name}) ${w.n} + FOR ${e.stats.FOR} = <b>${dmg}</b></span>`);
    await sleep(400);

    const armorVal = ARMORS[state.armorKey].reduce;
    const applied = isCrit ? 0 : armorVal;
    if(isCrit && armorVal>0){
      logEntry(`<span class="txt">Ignora sua ${ARMORS[state.armorKey].name} (-${armorVal} anulado).</span>`);
      await sleep(350);
    } else if(applied>0){
      logEntry(`<span class="txt">Sua ${ARMORS[state.armorKey].name} reduz ${applied} de dano.</span>`);
      await sleep(350);
    }

    const finalDmg = Math.max(0, dmg - applied);
    state.pv -= finalDmg;
    logEntry(`<b>Você sofre</b> <span class="txt dmg"><b>${finalDmg}</b> de dano${applied>0? ` (${dmg} bruto − ${applied} armadura)`:''}.</span>`,'dmg');
    renderSheet();
    renderCombat();
    await sleep(550);
  }

  if(guardBonusForThisAttack>0 && atkRoll===guardBonusForThisAttack){
    if(!guardCritNullified){
      logEntry(`<span class="txt good"><b>Guarda de Aço</b>: o d6 do ${e.name} (${atkRoll}) igualou o seu (${guardBonusForThisAttack}) — contra-ataque passivo!</span>`,'good');
      await sleep(450);
    }
    const w2 = WEAPONS[state.weaponKey];
    const dmgRoll2 = roll();
    const dmg2 = dmgRoll2 + w2.n + state.stats.FOR;
    logEntry(`<span class="txt">Contra-ataque: d6 ${dmgRoll2} + arma (${w2.name}) ${w2.n} + FOR ${state.stats.FOR} = <b>${dmg2}</b></span>`);
    await sleep(400);
    const counterResult = await dealDamageToEnemyCore(dmg2, false);
    if(counterResult.status==='dead'){
      state.cavaleiroGuardBonus = 0;
      await winCombat();
      return;
    }
  }

  state.cavaleiroGuardBonus = 0;

  const poisonKilled = await tickPoison();
  if(poisonKilled){ await winCombat(); return; }

  renderSheet();
  checkDeath();
  if(!state.dead){
    tickPerkCooldowns();
    renderCombatActions();
  }
}

async function tickPoison(){
  const e = state.combatEnemy;
  if(!e || !e.poisoned) return false;
  e.pv -= 1;
  logEntry(`<span class="txt dmg">O veneno consome <b>1</b> PV de ${e.name}.</span>`,'dmg');
  renderCombat();
  await sleep(400);
  if(e.pv<=0){
    if(e.key==='esqueleto' && !e.revived){
      e.revived = true;
      e.pv = Math.ceil(e.pvMax/2);
      logEntry(`<span class="txt dmg">O Guarda Esqueleto desmorona... e se reergue com metade do PV.</span>`,'dmg');
      renderCombat();
      await sleep(650);
      return false;
    }
    return true;
  }
  return false;
}

async function attemptFlee(){
  document.getElementById('actions').innerHTML = '';
  const e = state.combatEnemy;
  const r = rollForPlayer('Fuga — AGL');
  const total = r + effAGL();
  await sleep(500);
  logEntry(`<span class="txt">d6 ${r} + AGL ${effAGL()} = <b>${total}</b> vs CA ${e.ca}</span>`);
  await sleep(450);
  if(total>=e.ca){
    logEntry(`<span class="txt good">Você se desvencilha e recua.</span>`,'good');
    await sleep(450);
    const room = state.rooms[state.currentRoomId];
    endCombatUI();
    if(room.parentId) enterRoom(state.rooms[room.parentId]);
    else showRoomNavActions(room);
  } else {
    logEntry(`<span class="txt">Não há como escapar — o combate continua.</span>`);
    await sleep(450);
    await enemyTurn();
  }
}

async function winCombat(){
  const e = state.combatEnemy;
  logEntry(`<span class="txt good"><b>${e.name} derrotado.</b></span>`,'good');
  await sleep(500);
  const room = state.rooms[state.currentRoomId];

  if(e.boss){
    room.won = true;
    endCombatUI();
    victory();
    return;
  }

  endCombatUI();
  if(room.event) room.event.resolved = true; else room.event = {resolved:true};

  grantLoot(room, e, ()=>{
    const followup = roll();
    logEntry(`<b>Novo evento (recompensa da luta)</b> ${dieSpan(followup)}`);
    resolveEventRoll(room, followup);
  });
}

function grantLoot(room, enemy, then){
  if(!enemy.loot || !enemy.loot.length){ then(); return; }
  const drop = enemy.loot[Math.floor(Math.random()*enemy.loot.length)];
  const item = drop.type==='weapon' ? WEAPONS[drop.key] : ARMORS[drop.key];

  if(!roomIsLit(room)){
    logEntry(`<span class="txt">Está escuro demais para revistar o corpo agora — acenda uma tocha para recolher <b>${item.name}</b> depois.</span>`);
    room.pendingGrant = ()=> offerItemChoice(drop, ()=>{});
    then();
    return;
  }
  offerItemChoice(drop, then);
}

function offerItemChoice(drop, then){
  const actions = document.getElementById('actions');
  actions.innerHTML = '';
  const isWeapon = drop.type==='weapon';
  const item = isWeapon ? WEAPONS[drop.key] : ARMORS[drop.key];
  document.getElementById('room-panel').insertAdjacentHTML('beforeend', `<p class="flavor">Item recolhido do corpo: <b>${item.name}</b>.</p>`);
  const meetsReq = isWeapon ? meetsWeaponReq(item) : meetsArmorReq(item);

  if(meetsReq){
    actions.appendChild(mkButton(`Equipar ${item.name} agora`, ()=>{
      const old = isWeapon ? state.weaponKey : state.armorKey;
      if(isWeapon) state.weaponKey = drop.key; else state.armorKey = drop.key;
      if(old && !(isWeapon && old==='desarmado')){
        if(slotsUsed()<CAPACITY){ if(isWeapon) state.backpack.weapons.push(old); else state.backpack.armors.push(old); }
        else logEntry(`<span class="txt">Sem espaço — o equipamento anterior foi deixado para trás.</span>`);
      }
      renderSheet();
      actions.innerHTML = '';
      then();
    }));
  }
  if(slotsUsed() < CAPACITY){
    actions.appendChild(mkButton('Guardar na mochila', ()=>{
      if(isWeapon) state.backpack.weapons.push(drop.key); else state.backpack.armors.push(drop.key);
      renderSheet();
      logEntry(`<span class="txt">Guardado na mochila: ${item.name}.</span>`);
      actions.innerHTML = '';
      then();
    },'secondary'));
  }
  actions.appendChild(mkButton('Deixar para trás', ()=>{ actions.innerHTML=''; then(); },'secondary'));
}

function endCombatUI(){
  state.inCombat = false;
  state.combatEnemy = null;
  state._pactActive = false;
  document.getElementById('combat').classList.remove('active');
  renderRoomPVMarker();
}

function checkDeath(){
  if(state.pv<=0 && !state.dead){
    state.dead = true;
    logEntry(`<span class="txt dmg"><b>Você cai.</b></span>`,'dmg');
    showEnd(false);
  }
}

function victory(){
  state.victorious = true;
  logEntry(`<span class="txt good"><b>O Ciclope tomba. O Tesouro é seu.</b></span>`,'good');
  showEnd(true);
}

function showEnd(won){
  document.getElementById('combat').classList.remove('active');

  if(!won){
    showDeathOverlay();
    return;
  }

  const roomsExplored = Object.values(state.rooms).filter(r=>r.entered).length;
  const text = `Você atravessou ${roomsExplored} salas, carregando ${state.gold} de ouro, e saiu vivo pela porta que poucos encontram do lado de fora.`;

  document.getElementById('room-panel').innerHTML = `
    <div class="room-title" style="color:var(--acid)">O TESOURO É SEU</div>
    <p>${text}</p>
    <p class="flavor">O registro completo da sua jornada continua abaixo, sem pressa para rolar.</p>
  `;
  const actions = document.getElementById('actions');
  actions.innerHTML = '';
  actions.appendChild(mkButton('Nova descida', restartGame));
}

function showDeathOverlay(){
  const old = document.getElementById('death-overlay');
  if(old) old.remove();

  const roomsExplored = Object.values(state.rooms).filter(r=>r.entered).length;
  const overlay = document.createElement('div');
  overlay.id = 'death-overlay';
  overlay.innerHTML = `
    <div class="death-content">
      <h1>VOCÊ MORREU</h1>
      <p class="death-text">Você chegou a ${roomsExplored} salas, com ${state.gold} de ouro nas mãos, antes que a masmorra fechasse ao seu redor.</p>
      <div class="death-actions">
        <button id="death-restart">Nova descida</button>
        <button class="secondary" id="death-history-toggle">Ver histórico</button>
      </div>
      <div id="death-history">
        <div id="death-history-log"></div>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  const liveLog = document.getElementById('log');
  document.getElementById('death-history-log').innerHTML = liveLog ? liveLog.innerHTML : '';

  document.getElementById('death-restart').onclick = ()=>{
    overlay.remove();
    restartGame();
  };
  document.getElementById('death-history-toggle').onclick = ()=>{
    const hist = document.getElementById('death-history');
    const toggleBtn = document.getElementById('death-history-toggle');
    hist.classList.toggle('expanded');
    toggleBtn.textContent = hist.classList.contains('expanded') ? 'Ocultar histórico' : 'Ver histórico';
  };
}

function restartGame(){
  const overlay = document.getElementById('death-overlay');
  if(overlay) overlay.remove();

  state = newState();

  document.getElementById('game').classList.add('hidden');
  document.getElementById('setup').classList.remove('hidden');

  document.querySelectorAll('.class-card').forEach(el=>el.classList.remove('selected'));
  document.getElementById('log').innerHTML = '';
  document.getElementById('room-panel').innerHTML = '';
  document.getElementById('combat').innerHTML = '';
  document.getElementById('combat').classList.remove('active');
  document.getElementById('actions').innerHTML = '';
  document.getElementById('map-card').innerHTML = '';

  renderStatRow();
  renderEquipmentGrids();
  checkSetupReady();
  updateTaskbar();
}

/* ===================================================================
   SISTEMA DE JANELAS (arrastar, sobrepor, minimizar)
=================================================================== */

let winZTop = 10;
let winsInitialized = false;
let layoutApplied = false;

function bringWindowToFront(winEl){
  winZTop++;
  winEl.style.zIndex = winZTop;
}

function initWindowSystem(){
  if(winsInitialized) return;
  winsInitialized = true;

  document.querySelectorAll('#desktop .win').forEach((winEl, idx)=>{
    winEl.style.zIndex = 10 + idx;
    const titlebar = winEl.querySelector('.win-titlebar');
    const minBtn = winEl.querySelector('.win-min');
    let dragging = false, pointerId = null;
    let startX = 0, startY = 0, startLeft = 0, startTop = 0;

    titlebar.addEventListener('pointerdown', (e)=>{
      if(e.target === minBtn) return;
      bringWindowToFront(winEl);
      dragging = true;
      pointerId = e.pointerId;
      startX = e.clientX;
      startY = e.clientY;
      startLeft = winEl.offsetLeft;
      startTop = winEl.offsetTop;
      if(titlebar.setPointerCapture){
        try{ titlebar.setPointerCapture(pointerId); }catch(err){}
      }
      e.preventDefault();
    });
    titlebar.addEventListener('pointermove', (e)=>{
      if(!dragging || e.pointerId!==pointerId) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      winEl.style.left = Math.max(0, startLeft + dx) + 'px';
      winEl.style.top = Math.max(0, startTop + dy) + 'px';
    });
    const stopDrag = (e)=>{ if(pointerId!==null){ dragging = false; } };
    titlebar.addEventListener('pointerup', stopDrag);
    titlebar.addEventListener('pointercancel', stopDrag);

    winEl.addEventListener('pointerdown', ()=> bringWindowToFront(winEl));

    minBtn.addEventListener('click', (e)=>{
      e.stopPropagation();
      winEl.classList.toggle('minimized');
      updateTaskbar();
    });
  });
}

function updateTaskbar(){
  const bar = document.getElementById('taskbar');
  if(!bar) return;
  bar.innerHTML = '';
  document.querySelectorAll('#desktop .win.minimized').forEach(winEl=>{
    const title = winEl.querySelector('.win-title').textContent;
    const item = document.createElement('div');
    item.className = 'taskbar-item';
    item.textContent = title;
    item.onclick = ()=>{
      winEl.classList.remove('minimized');
      bringWindowToFront(winEl);
      updateTaskbar();
    };
    bar.appendChild(item);
  });
}

function layoutDefaultWindows(){
  const desktop = document.getElementById('desktop');
  const winSheet = document.getElementById('win-sheet');
  const winMap = document.getElementById('win-map');
  const winRoom = document.getElementById('win-room');
  const winActions = document.getElementById('win-actions');
  const winLog = document.getElementById('win-log');
  const isNarrow = window.innerWidth < 900;

  if(isNarrow){
    const w = Math.max(230, Math.min(window.innerWidth - 24, 440));
    const heights = [420, 220, 320, 150, 280];
    const wins = [winSheet, winMap, winRoom, winActions, winLog];
    let y = 12;
    wins.forEach((el, i)=>{
      el.style.left = '10px';
      el.style.top = y + 'px';
      el.style.width = w + 'px';
      el.style.height = heights[i] + 'px';
      y += heights[i] + 14;
    });
    desktop.style.minHeight = (y + 80) + 'px';
  } else {
    winSheet.style.left='16px';   winSheet.style.top='16px';  winSheet.style.width='300px';  winSheet.style.height='560px';
    winMap.style.left='332px';    winMap.style.top='16px';    winMap.style.width='420px';    winMap.style.height='230px';
    winRoom.style.left='332px';   winRoom.style.top='262px';  winRoom.style.width='420px';   winRoom.style.height='360px';
    winActions.style.left='332px';winActions.style.top='638px';winActions.style.width='420px';winActions.style.height='140px';
    winLog.style.left='768px';    winLog.style.top='16px';    winLog.style.width='360px';    winLog.style.height='600px';
    desktop.style.minHeight = '820px';
  }
}

/* ===================================================================
   INIT
=================================================================== */

state = newState();
renderClassGrid();
renderStatRow();
renderEquipmentGrids();
</script>
